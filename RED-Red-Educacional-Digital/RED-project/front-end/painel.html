<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED - Rede Educacional Digital</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="dashboard-container">
        
        <header class="topbar">
            <div class="logo">RED</div>
            <div class="search-bar">
                <input type="text" placeholder="Converse com nossa IA">
            </div>
            <div class="top-icons">
                <span class="icon-config">⚙️</span>
                <span class="icon-help">❓</span>
            </div>
        </header>

        <aside class="sidebar-left">
            <nav class="main-menu">
                <ul>
                    <li>Painel inicial</li>
                    <li>Tarefas</li>
                    <li>Agenda</li>
                    <li>Biblioteca digital</li>
                </ul>
            </nav>
            <div class="ultimas-notas">
                <h3>Últimas notas</h3>
                </div>
            <button class="btn-sair">Sair</button>
        </aside>

        <main class="main-content">
            <h2>Painel Inicial</h2>
        </main>

        <aside class="sidebar-right">
            <div class="perfil">
                <div class="foto-perfil"></div>
                <p>Antônio da Silva Pinto</p>
            </div>
            <div class="desempenho-mini">
                <h3>Desempenho do aluno ></h3>
                </div>
            <div class="conversas-atalho">
                <h3>Conversas</h3>
                </div>
        </aside>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
